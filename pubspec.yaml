name: money_management_mobile
description: 'A new Flutter project.'
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  dio: ^5.9.2
  get_it: ^9.2.1
  go_router: ^17.1.0
  google_fonts: ^8.0.2
  flutter_svg: ^2.2.4
  logging: ^1.3.0
  intl: ^0.20.2
  shared_preferences: ^2.5.4
  phosphor_flutter: ^2.1.0
  flutter_timezone: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/svg/
